services:
  postgres:
    image: postgres:16-alpine
    container_name: tamado-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tamado
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tamado-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: tamado-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tamado?schema=public
      JWT_SECRET: development-secret-key-at-least-32-chars
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./apps/backend/prisma:/app/apps/backend/prisma:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tamado-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    container_name: tamado-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
    depends_on:
      - backend
    networks:
      - tamado-network

volumes:
  postgres_data:

networks:
  tamado-network:
    driver: bridge
